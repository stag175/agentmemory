# fly.io deployment for agentmemory.
#
# AGENTMEMORY_SECRET must be set with `fly secrets set` before deploy
# because the REST API is bound to Fly's public HTTPS proxy. To rotate:
# update the Fly secret, then restart the machine.
#
# Only port 3111 (REST API) is exposed publicly. Viewer 3113 stays bound
# to localhost inside the machine; reach it via `fly proxy 3113:3113`.

app = "agentmemory"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[[mounts]]
  source = "agentmemory_data"
  destination = "/data"
  initial_size = "1gb"

[http_service]
  internal_port = 3111
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/agentmemory/livez"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
