name: CI

# `paths-ignore` keeps doc-only / website / README / CHANGELOG churn from
# burning runner minutes. Source / config / workflow changes always run.
# `workflow_dispatch` gives a manual re-run button for flake debugging.
on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "CHANGELOG.md"
      - "AGENTS.md"
      - "ROADMAP.md"
      - "website/**"
      - "docs/**"
      - "assets/**"
      - "deploy/**/README.md"
      - "**/*.md"
      - "**/*.mdx"
  pull_request:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "CHANGELOG.md"
      - "AGENTS.md"
      - "ROADMAP.md"
      - "website/**"
      - "docs/**"
      - "assets/**"
      - "deploy/**/README.md"
      - "**/*.md"
      - "**/*.mdx"
  workflow_dispatch:

# Cancel in-flight PR runs when a force-push lands. Keep push runs to
# protect against partial state on main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't bail the whole matrix on one cell's failure — we want to
      # see whether the same failure reproduces across OSes (e.g.
      # whether a flake is platform-specific or universal).
      fail-fast: false
      matrix:
        # Cover both supported Node lines on Unix and keep one Windows
        # lane for path, process, and packaging regressions without
        # multiplying the full matrix unnecessarily.
        include:
          - os: ubuntu-latest
            node-version: "20"
          - os: ubuntu-latest
            node-version: "22"
          - os: macos-latest
            node-version: "20"
          - os: macos-latest
            node-version: "22"
          - os: windows-latest
            node-version: "22"
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      # Two-step install: generate a lockfile in-runner with
      # --package-lock-only, then install from it with `npm ci`.
      # Lockfiles are gitignored at the repo level.
      - run: npm install --package-lock-only --legacy-peer-deps --no-audit --no-fund
      - run: npm ci --legacy-peer-deps --no-audit --no-fund
      - run: npm run build
      - run: npm run skills:check
      - run: npm test
      - name: Retrieval regression smoke
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '22'
        run: npm run bench:retrieval-smoke

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npm install --package-lock-only --legacy-peer-deps --no-audit --no-fund
      - run: npm ci --legacy-peer-deps --no-audit --no-fund
      - name: Run isolated live API integration suite
        run: npm run test:integration
