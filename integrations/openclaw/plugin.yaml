name: agentmemory
version: 0.9.4
description: "Persistent cross-session memory for OpenClaw via agentmemory. 95.2% retrieval accuracy on LongMemEval-S."
author: "Rohit Ghumare"
homepage: "https://github.com/rohitg00/agentmemory"
license: Apache-2.0

category: memory
tags:
  - memory
  - persistence
  - mcp
  - context

# Host events plugin.mjs actually registers (plus the memory-slot
# capability via registerMemoryCapability).
hooks:
  - before_agent_start
  - agent_end

config:
  enabled: true
  base_url: http://localhost:3111
  token_budget: 2000
  min_confidence: 0.5
  fallback_on_error: true
  timeout_ms: 5000
